<!-- Language Selector -->
<div class="fixed top-4 right-4 z-40 bg-white bg-opacity-95 rounded-xl p-4 shadow-xl">
    <div class="text-xs text-gray-600 mb-2 text-center" data-translate="languageSelectText">Válassz nyelvet:</div>
    <div class="grid grid-cols-5 gap-2">
        <!-- Tier 1 Essential Languages -->
        <button class="language-btn p-2 rounded-lg bg-blue-50 hover:bg-blue-100" onclick="setLanguage('hu')" title="Magyar">🇭🇺</button>
        <button class="language-btn p-2 rounded-lg bg-blue-50 hover:bg-blue-100" onclick="setLanguage('en')" title="English">🇬🇧</button>
        <button class="language-btn p-2 rounded-lg bg-blue-50 hover:bg-blue-100" onclick="setLanguage('ar')" title="العربية">🇦🇪</button>
        <button class="language-btn p-2 rounded-lg bg-blue-50 hover:bg-blue-100" onclick="setLanguage('hi')" title="हिन्दी">🇮🇳</button>
        <button class="language-btn p-2 rounded-lg bg-blue-50 hover:bg-blue-100" onclick="setLanguage('zh')" title="中文">🇨🇳</button>
        <!-- Tier 2 High Priority -->
        <button class="language-btn p-2 rounded-lg bg-yellow-50 hover:bg-yellow-100" onclick="setLanguage('ru')" title="Русский">🇷🇺</button>
        <button class="language-btn p-2 rounded-lg bg-yellow-50 hover:bg-yellow-100" onclick="setLanguage('ur')" title="اردو">🇵🇰</button>
        <button class="language-btn p-2 rounded-lg bg-yellow-50 hover:bg-yellow-100" onclick="setLanguage('fr')" title="Français">🇫🇷</button>
        <button class="language-btn p-2 rounded-lg bg-yellow-50 hover:bg-yellow-100" onclick="setLanguage('es')" title="Español">🇪🇸</button>
        <button class="language-btn p-2 rounded-lg bg-yellow-50 hover:bg-yellow-100" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
        <!-- További nyelvek -->
        <button class="language-btn p-2 rounded-lg bg-green-50 hover:bg-green-100" onclick="setLanguage('tr')" title="Türkçe">🇹🇷</button>
        <button class="language-btn p-2 rounded-lg bg-green-50 hover:bg-green-100" onclick="setLanguage('fa')" title="فارسی">🇮🇷</button>
        <button class="language-btn p-2 rounded-lg bg-green-50 hover:bg-green-100" onclick="setLanguage('it')" title="Italiano">🇮🇹</button>
        <button class="language-btn p-2 rounded-lg bg-green-50 hover:bg-green-100" onclick="setLanguage('pt')" title="Português">🇵🇹</button>
        <button class="language-btn p-2 rounded-lg bg-green-50 hover:bg-green-100" onclick="setLanguage('ja')" title="日本語">🇯🇵</button>
        <!-- További nyelvek -->
        <button class="language-btn p-2 rounded-lg bg-gray-50 hover:bg-gray-100" onclick="setLanguage('pl')" title="Polski">🇵🇱</button>
        <button class="language-btn p-2 rounded-lg bg-gray-50 hover:bg-gray-100" onclick="setLanguage('ko')" title="한국어">🇰🇷</button>
        <button class="language-btn p-2 rounded-lg bg-gray-50 hover:bg-gray-100" onclick="setLanguage('nl')" title="Nederlands">🇳🇱</button>
        <button class="language-btn p-2 rounded-lg bg-gray-50 hover:bg-gray-100" onclick="setLanguage('th')" title="ไทย">🇹🇭</button>
        <button class="language-btn p-2 rounded-lg bg-gray-50 hover:bg-gray-100" onclick="setLanguage('tl')" title="Tagalog">🇵🇭</button>
    </div>
</div>
