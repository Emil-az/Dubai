<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai Info Hub - Magyaroknak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(to bottom, #60a5fa, #fbbf24);
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body>
    <main style="max-width: 1200px; margin: 0 auto; padding: 2rem;">
        <div style="max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.9); padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            
            <h1 class="text-4xl font-bold text-center text-blue-600 mb-6">
                🏗️ Dubai Infó magyaroknak
            </h1>
            
            <p class="text-xl text-center mb-8 text-gray-700">
                Ingyenes tanácsok: Dubai ingatlan, Golden Visa, utazási tippek, 8-12% hozam lehetőség
            </p>
            
            <div class="text-center space-y-4 mb-8">
                <a href="mailto:kormanyemil@yahoo.com" 
                   class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors duration-200 font-semibold">
                    ✉️ Írj kérdést nekünk!
                </a>
                
                <br><br>
                
                <button class="bg-yellow-400 text-black px-6 py-3 rounded-lg font-semibold hover:bg-yellow-500 transition-colors duration-200">
                    🎯 Pontgyűjtés (hamarosan)
                </button>
            </div>
            
            <div class="bg-blue-100 p-6 rounded-lg mb-8">
                <h3 class="font-bold text-lg mb-2">📅 Következő ingyenes Zoom meeting:</h3>
                <p class="text-lg">Október 25., 18:00</p>
                <p class="text-sm text-gray-600">(Zoom link hamarosan érkezik emailben)</p>
            </div>
            
            <div class="text-center space-x-4">
                <a href="https://t.me/share/url?url=https://dubai-info-hub.netlify.app" 
                   target="_blank" 
                   class="inline-block bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition-colors duration-200">
                    📱 Telegram
                </a>
                
                <a href="https://www.facebook.com/sharer/sharer.php?u=https://dubai-info-hub.netlify.app" 
                   target="_blank" 
                   class="inline-block bg-blue-700 text-white px-4 py-2 rounded hover:bg-blue-800 transition-colors duration-200">
                    👥 Facebook
                </a>
            </div>
        </div>
    </main>
</body>
</html>
